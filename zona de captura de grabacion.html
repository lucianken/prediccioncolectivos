<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bounding Box Grabador CABA/GBA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 10px 16px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  #header h1 { font-size: 14px; color: #e94560; }
  .coord-group { display: flex; gap: 8px; align-items: center; font-size: 13px; }
  .coord-group label { color: #a0a0b0; }
  .coord-group input { width: 80px; background: #0f3460; border: 1px solid #1a4a8a; color: #7ec8e3; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-size: 13px; }
  #btn-update { background: #e94560; color: white; border: none; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  #btn-update:hover { background: #c73652; }
  #map { flex: 1; }
  #info { padding: 8px 16px; background: #16213e; font-size: 12px; color: #7ec8e3; border-top: 1px solid #0f3460; }
  #info span { margin-right: 20px; }
  #info .code { background: #0f3460; padding: 2px 6px; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <h1>BBOX GRABADOR</h1>
  <div class="coord-group">
    <label>LAT_MIN</label><input id="lat_min" value="-35.1">
    <label>LAT_MAX</label><input id="lat_max" value="-34.3">
  </div>
  <div class="coord-group">
    <label>LON_MIN</label><input id="lon_min" value="-59.1">
    <label>LON_MAX</label><input id="lon_max" value="-57.9">
  </div>
  <button id="btn-update" onclick="updateBbox()">Actualizar</button>
</div>

<div id="map"></div>

<div id="info">
  <span>Click en el mapa para ver coordenadas</span>
  <span id="cursor-pos"></span>
  <span id="bbox-code"></span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Puntos de referencia
  const REFERENCIAS = [
    { name: "Obelisco", lat: -34.6037, lon: -58.3816 },
    { name: "Aeroparque", lat: -34.5591, lon: -58.4156 },
    { name: "Ezeiza", lat: -34.8222, lon: -58.5358 },
    { name: "La Plata", lat: -34.9215, lon: -57.9545 },
    { name: "Morón", lat: -34.6528, lon: -58.6194 },
    { name: "Tigre", lat: -34.4260, lon: -58.5796 },
    { name: "Quilmes", lat: -34.7206, lon: -58.2544 },
    { name: "San Isidro", lat: -34.4736, lon: -58.5270 },
    { name: "Lomas de Zamora", lat: -34.7595, lon: -58.4029 },
    { name: "Lanús", lat: -34.7073, lon: -58.3849 },
  ];

  const map = L.map('map').setView([-34.65, -58.5], 10);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);

  // Marcadores de referencia
  REFERENCIAS.forEach(r => {
    L.circleMarker([r.lat, r.lon], {
      radius: 5, color: '#f0a500', fillColor: '#f0a500', fillOpacity: 0.8, weight: 1
    }).addTo(map).bindTooltip(r.name, { permanent: false });
  });

  // Polígono del bbox
  let bboxRect = null;

  function getBboxValues() {
    return {
      lat_min: parseFloat(document.getElementById('lat_min').value),
      lat_max: parseFloat(document.getElementById('lat_max').value),
      lon_min: parseFloat(document.getElementById('lon_min').value),
      lon_max: parseFloat(document.getElementById('lon_max').value),
    };
  }

  function updateBbox() {
    const { lat_min, lat_max, lon_min, lon_max } = getBboxValues();

    if (bboxRect) map.removeLayer(bboxRect);

    // Rectángulo principal
    bboxRect = L.rectangle(
      [[lat_min, lon_min], [lat_max, lon_max]],
      { color: '#e94560', weight: 2, fillColor: '#e94560', fillOpacity: 0.08 }
    ).addTo(map);

    // Esquinas con labels
    const corners = [
      { pos: [lat_min, lon_min], label: `SW\n${lat_min}, ${lon_min}` },
      { pos: [lat_min, lon_max], label: `SE\n${lat_min}, ${lon_max}` },
      { pos: [lat_max, lon_min], label: `NW\n${lat_max}, ${lon_min}` },
      { pos: [lat_max, lon_max], label: `NE\n${lat_max}, ${lon_max}` },
    ];

    // Mostrar código Python
    document.getElementById('bbox-code').innerHTML =
      `Python: <span class="code">LAT_MIN, LAT_MAX = ${lat_min}, ${lat_max} &nbsp; LON_MIN, LON_MAX = ${lon_min}, ${lon_max}</span>`;

    map.fitBounds([[lat_min, lon_min], [lat_max, lon_max]], { padding: [40, 40] });
  }

  map.on('mousemove', e => {
    document.getElementById('cursor-pos').textContent =
      `Cursor: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
  });

  map.on('click', e => {
    const { lat_min, lat_max, lon_min, lon_max } = getBboxValues();
    const inside = e.latlng.lat >= lat_min && e.latlng.lat <= lat_max &&
                   e.latlng.lng >= lon_min && e.latlng.lng <= lon_max;
    L.popup()
      .setLatLng(e.latlng)
      .setContent(`<b>${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}</b><br>${inside ? '✅ dentro del bbox' : '❌ fuera del bbox'}`)
      .openOn(map);
  });

  // Inicializar
  updateBbox();
</script>
</body>
</html>
